plugins {
    id 'scala'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.scala-lang:scala-library:2.12.15'
    implementation 'org.apache.spark:spark-core_2.12:3.5.8'
    implementation 'org.apache.spark:spark-sql_2.12:3.5.8'
}

application {
    mainClass = 'com.example.HelloSpark'
    applicationDefaultJvmArgs = ["--add-opens=java.base/java.nio=ALL-UNNAMED"]
}
